name: Sync upstream mattpocock/skills

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream/main
        id: merge
        shell: bash
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/mattpocock/skills.git || git remote set-url upstream https://github.com/mattpocock/skills.git
          git fetch upstream main --prune
          before="$(git rev-parse HEAD)"
          git merge --no-edit upstream/main
          after="$(git rev-parse HEAD)"
          if [ "$before" = "$after" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push sync branch
        if: steps.merge.outputs.changed == 'true'
        run: |
          branch="sync/upstream-main"
          git checkout -B "$branch"
          git push --force-with-lease origin "$branch"

      - name: Open or update pull request
        if: steps.merge.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="sync/upstream-main"
          if gh pr view "$branch" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$branch" --repo "$GITHUB_REPOSITORY" \
              --title "Sync upstream mattpocock/skills" \
              --body "Automated merge of mattpocock/skills upstream/main into this pi-coding-agent fork. Review pi-specific files before merging."
          else
            gh pr create --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$branch" \
              --title "Sync upstream mattpocock/skills" \
              --body "Automated merge of mattpocock/skills upstream/main into this pi-coding-agent fork. Review pi-specific files before merging."
          fi
